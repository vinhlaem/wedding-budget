<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Left ring -->
  <circle cx="200" cy="256" r="88" fill="none" stroke="white" stroke-width="28" stroke-opacity="0.95"/>

  <!-- Right ring -->
  <circle cx="312" cy="256" r="88" fill="none" stroke="white" stroke-width="28" stroke-opacity="0.95"/>

  <!-- Cover the stroke in the bottom overlap so rings appear interlocked -->
  <!-- Bottom arc of right ring covers bottom arc of left ring -->
  <path
    d="M 256 344
       A 88 88 0 0 0 400 256
       A 88 88 0 0 0 312 168
       A 88 88 0 0 0 256 195"
    fill="none"
    stroke="#18181b"
    stroke-width="32"
    stroke-opacity="0.97"
  />

  <!-- Heart in the center overlap area -->
  <path
    d="M256 308
       C256 308 222 283 222 258
       C222 239 236 228 246 235
       C250 238 254 245 256 251
       C258 245 262 238 266 235
       C276 228 290 239 290 258
       C290 283 256 308 256 308 Z"
    fill="white"
    opacity="0.9"
  />
</svg>
